<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WCS AI Builder</title>

<link rel="stylesheet" href="css/main.css">

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* LEFT PANEL */
.panel {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
}

.panel h1 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
}

input, textarea, select {
    width: 100%;
    margin-bottom: 0.8rem;
    padding: 0.7rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    color: white;
}

button {
    width: 100%;
    padding: 0.8rem;
    margin-top: 0.5rem;
    border-radius: 999px;
    border: none;
    cursor: pointer;
}

.primary {
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white;
}

.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: white;
}

/* RIGHT PREVIEW */
.preview {
    flex: 1;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
}

.preview-header {
    padding: 0.8rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    color: var(--text-muted);
    font-size: 0.9rem;
}

iframe {
    flex: 1;
    border: none;
    background: white;
}
</style>

</head>

<body>

<!-- LEFT PANEL -->
<div class="panel">

    <h1>WCS AI Builder</h1>

    <input id="name" placeholder="Business Name">
    <input id="industry" placeholder="Industry">

    <textarea id="description" placeholder="Describe your business"></textarea>

    <select id="tone">
        <option>Modern</option>
        <option>Corporate</option>
        <option>Luxury</option>
        <option>Minimal</option>
    </select>

    <input id="color" placeholder="Colors (optional)">

    <button class="primary" onclick="generate()">Generate Site</button>
    <button class="secondary" onclick="regenerate()">Redo Design</button>
    <button class="secondary" onclick="copyCode()">Copy Code</button>

</div>

<!-- RIGHT PREVIEW -->
<div class="preview">

    <div class="preview-header">
        <span>Live Preview</span>
        <span>WCS AI Engine</span>
    </div>

    <iframe id="frame"></iframe>

</div>

<script src="builder.js"></script>

</body>
</html>
