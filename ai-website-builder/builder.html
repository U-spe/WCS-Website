<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCS AI Website Builder</title>

<style>
:root{
    --bg:#050505;
    --panel:#0b1220;
    --panel-2:#101827;
    --border:rgba(255,255,255,.08);
    --text:#fff;
    --muted:#9ca3af;

    --blue:#2563eb;
    --purple:#7c3aed;
    --cyan:#22d3ee;

    --radius:18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    background:
        radial-gradient(circle at top left,
        rgba(37,99,235,.15),
        transparent 35%),
        radial-gradient(circle at top right,
        rgba(124,58,237,.15),
        transparent 35%),
        var(--bg);

    color:var(--text);
    font-family:Inter,system-ui,Arial,sans-serif;
}

/* =========================
   SIDEBAR
========================= */

.panel{
    width:420px;
    background:rgba(11,18,32,.85);
    backdrop-filter:blur(24px);
    border-right:1px solid var(--border);
    overflow-y:auto;
    padding:28px;
}

.brand{
    margin-bottom:28px;
}

.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:rgba(34,211,238,.08);
    border:1px solid rgba(34,211,238,.15);
    color:var(--cyan);
    font-size:.8rem;
    margin-bottom:14px;
}

.brand h1{
    font-size:1.8rem;
    margin-bottom:8px;
}

.brand p{
    color:var(--muted);
    line-height:1.6;
}

.section-title{
    margin:22px 0 10px;
    font-size:.85rem;
    letter-spacing:1px;
    color:var(--muted);
    text-transform:uppercase;
}

input,
textarea,
select{
    width:100%;
    border:none;
    outline:none;
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    color:white;
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:12px;
    transition:.2s ease;
}

textarea{
    min-height:120px;
    resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
    border-color:rgba(34,211,238,.5);
    box-shadow:0 0 0 3px rgba(34,211,238,.08);
}

/* =========================
   BUTTONS
========================= */

.actions{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button{
    width:100%;
    border:none;
    cursor:pointer;
    padding:14px;
    border-radius:999px;
    font-weight:700;
    transition:.25s ease;
}

.primary{
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color:white;
}

.primary:hover{
    transform:translateY(-2px);
    box-shadow: 0 4px 12px rgba(37,99,235,.3);
}

.secondary{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    color:white;
}

.secondary:hover{
    background:rgba(255,255,255,.06);
}

/* =========================
   PREVIEW
========================= */

.preview{
    flex:1;
    display:flex;
    flex-direction:column;
}

.preview-top{
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,.02);
}

.preview-top h2{
    font-size:.95rem;
    font-weight:600;
}

.preview-status{
    color:var(--muted);
    font-size:.85rem;
    transition: color 0.3s ease;
}

iframe{
    flex:1;
    border:none;
    background:white;
}

/* =========================
   MOBILE
========================= */

@media (max-width:950px){
    body{
        flex-direction:column;
    }
    .panel{
        width:100%;
        max-height:50vh;
        border-right:none;
        border-bottom:1px solid var(--border);
    }
}
</style>
</head>
<body>

<div class="panel">
    <div class="brand">
        <div class="badge">WCS AI Studio</div>
        <h1>AI Website Builder</h1>
        <p>Generate complete business websites with AI powered layouts, content, structure, branding, and design concepts.</p>
    </div>

    <div class="section-title">Business Information</div>
    <input id="name" placeholder="Website Name">
    <textarea id="description" placeholder="Describe the business, organization, or project"></textarea>
    <input id="industry" placeholder="Business Type">

    <div class="section-title">Design Preferences</div>
    <input id="color" placeholder="Preferred Colors (e.g. Blue and Gold)">
    <select id="tone">
        <option value="modern">Modern</option>
        <option value="corporate">Corporate</option>
        <option value="luxury">Luxury</option>
        <option value="minimal">Minimal</option>
        <option value="creative">Creative</option>
        <option value="technology">Technology</option>
    </select>
    <input id="tagline" placeholder="Tagline (optional)">
    <input id="audience" placeholder="Target Audience">
    
    <div class="actions">
        <button id="generate-btn" class="primary">Generate Website</button>
        <button id="redo-btn" class="secondary">Redo Design</button>
        <button id="copy-btn" class="secondary">Copy Code</button>
    </div>
</div>

<div class="preview">
    <div class="preview-top">
        <h2>Live Website Preview</h2>
        <div id="status-text" class="preview-status">Ready</div>
    </div>
    <iframe id="frame"></iframe>
</div>

<script type="module" src="/ai-website-builder/builder.js"></script>

</body>
</html>
