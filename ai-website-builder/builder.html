<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WCS AI Site Builder</title>

<link rel="stylesheet" href="../css/main.css">

<style>
:root {
    --bg: #050505;
    --panel: rgba(15, 23, 42, 0.55);
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --muted: #9ca3af;

    --primary: #2563eb;
    --secondary: #7c3aed;
    --accent: #22d3ee;

    --radius: 18px;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: radial-gradient(circle at top, #0b0f1a, var(--bg));
    color: var(--text);
    font-family: Inter, system-ui, Arial;
}

/* ======================
   LEFT PANEL
====================== */

.panel {
    width: 360px;
    padding: 24px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.panel h1 {
    font-size: 1.3rem;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
}

/* inputs */
input, textarea, select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.35);
    color: white;
    outline: none;
    transition: 0.2s ease;
}

input:focus, textarea:focus, select:focus {
    border-color: rgba(34,211,238,0.6);
    box-shadow: 0 0 0 3px rgba(34,211,238,0.08);
}

/* buttons */
button {
    width: 100%;
    padding: 12px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.25s ease;
}

.primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.primary:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

.secondary {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: white;
}

.secondary:hover {
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
}

/* ======================
   RIGHT PREVIEW
====================== */

.preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0a0a0a;
}

.preview-bar {
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

/* iframe */
iframe {
    flex: 1;
    border: none;
    background: white;
}

/* ======================
   SMALL SCREEN SUPPORT
====================== */

@media (max-width: 900px) {
    body {
        flex-direction: column;
    }

    .panel {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }

    iframe {
        height: 100%;
    }
}
</style>

</head>

<body>

<div class="panel">

    <h1>AI Website Builder</h1>

    <input id="name" placeholder="Business Name">
    <input id="industry" placeholder="Industry">

    <textarea id="description" placeholder="Describe your business"></textarea>

    <select id="tone">
        <option value="modern">Modern</option>
        <option value="corporate">Corporate</option>
        <option value="luxury">Luxury</option>
        <option value="minimal">Minimal</option>
    </select>

    <input id="color" placeholder="Colors (optional)">

    <button class="primary" onclick="generateSite()">Generate Site</button>
    <button class="secondary" onclick="regenerate()">Redo Design</button>
    <button class="secondary" onclick="copyCode()">Copy Code</button>

</div>

<div class="preview">
    <div class="preview-bar">Live Preview</div>
    <iframe id="frame"></iframe>
</div>

<script src="/ai-website-builder/builder.js"></script>

</body>
</html>
